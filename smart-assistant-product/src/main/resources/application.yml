server.shutdown: graceful  # ⭐ 优雅关闭，等待处理中的请求完成
server:
  port: 8084

spring:
  application:
    name: product-service

  # ⭐ 排除 Spring Security + DeepSeek 自动配置 (使用自定义 ChatModel 禁用 thinking_mode)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.ai.model.deepseek.autoconfigure.DeepSeekChatAutoConfiguration

  # Spring Cloud 配置
  cloud:
    compatibility-verifier:
      enabled: false  # 禁用版本兼容性检查（Spring Boot 3.4.x + Spring Cloud Alibaba 2023.x）
    
    # ⭐ 禁用 Nacos Config 导入检查
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: true
        server-addr: 127.0.0.1:8848
        namespace: ""
        group: DEFAULT_GROUP
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD}
        # 注册时携带元数据（供 Router 使用）
        metadata:
          agent-type: food_recommendation
          capabilities: cuisine_query,restaurant_recommendation,nearby_search
          keywords: 美食,餐厅,菜系,特色菜,吃什么,附近美食,推荐餐厅
          cache-ttl-seconds: "43200"    # ⭐ 回复缓存 TTL（秒），美食类 12h
          # ⭐ 版本管理
          version: "1.0.0"
          protocol-version: "v1"
          min-client-version: "1.0.0"
          supported-protocols: "a2a-v1"

  # 数据源配置（PostgreSQL + JdbcTemplate）
  datasource:
    url: jdbc:postgresql://localhost:5432/a2a_system
    username: postgres
    password: ${POSTGRES_PASSWORD}  # ⚠️ 必须设置 POSTGRES_PASSWORD 环境变量
    driver-class-name: org.postgresql.Driver

  ai:
    # ⭐ Ollama 本地模型配置（本地推理主通道）
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: deepseek-r1:7b
          temperature: 0.7

    # &#x2a67; Nacos 注册中心配置（元数据已通过 spring.cloud.nacos.discovery.metadata 配置）
    # A2A 协议已移除，改为 REST 方式调用

    # ⭐ MCP Server 配置（内嵌模式）
    mcp:
      server:
        enabled: true  # 启用 MCP Server

# 高德地图 API 配置（用于搜索附近娱乐项目）
amap:
  api:
    key: ${AMAP_API_KEY:}  # 请替换为实际的高德地图 API Key，申请地址：https://lbs.amap.com/

# Actuator + Prometheus + Tracing 配置（监控端点）⭐
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,refresh  # ⭐ 添加 refresh 端点支持热重载
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
  
  # 分布式追踪配置 (Jaeger - Zipkin 兼容模式)
  tracing:
    sampling:
      probability: 0.3  # ⭐ 采样率 30%（开发环境已足够，生产环境可调整为 0.1）
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans  # ⭐ Jaeger 兼容 Zipkin 协议的端点

# ⭐ BGE embedding 配置（1.2GB 模型从项目级共享目录加载）
bge:
  model:
    path: ${BGE_MODEL_PATH:D:\\workspace\\SmartAssistant\\models\\bge-large-zh-v1.5.onnx}
  vocab:
    path: ${BGE_VOCAB_PATH:D:\\workspace\\SmartAssistant\\models\\tokenizer.json}

# Logging 配置（输出到文件，供 Loki 收集）⭐
logging:
  file:
    name: logs/${spring.application.name}.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
