server.shutdown: graceful  # ⭐ 优雅关闭，等待处理中的请求完成
spring.lifecycle.timeout-per-shutdown-phase: "30s"
server:
  port: 8084

spring:
  # ⭐ JDK 21 虚拟线程：每请求一线程 + @Async/@Scheduled 默认走虚拟线程（I/O 阻塞型服务收益显著）
  threads:
    virtual:
      enabled: true
  application:
    name: product-service

  # ⭐ 加载外部技能包配置
  config:
    import: classpath:skill-packages.yml

  # ⭐ 排除 Spring Security 自动配置（DeepSeek 改用原生自动配置）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  # Spring Cloud 配置
  cloud:
    compatibility-verifier:
      enabled: false  # 禁用版本兼容性检查（Spring Boot 3.4.x + Spring Cloud Alibaba 2023.x）
    
    # ⭐ 禁用 Nacos Config 导入检查
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: true
        server-addr: 127.0.0.1:8848
        namespace: ""
        group: DEFAULT_GROUP
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD}
        # 注册时携带元数据（供 Router Agent 发现和路由决策）
        metadata:
          agent-type: product_agent
          capabilities: product_query,price_query,stock_check
          keywords: 商品,价格,库存,规格,颜色,多少钱,有货,参数,对比,手机,电脑,推荐,性价比
          priority: 10
          cache-ttl-seconds: "43200"    # ⭐ 回复缓存 TTL（秒），商品咨询类 12h
          always-cache-reply: "true"    # ⭐ 首次即缓存回复，无需等待成为高频问题
          # ⭐ 版本管理
          version: "1.0.0"
          protocol-version: "v1"
          min-client-version: "1.0.0"
          supported-protocols: "a2a-v1"

# ⭐ Nacos A2A Registry 配置（AgentCard 注册）
# 默认关闭，开启后自动向 Nacos A2A Registry 注册 ProductAgent AgentCard。
nacos:
  a2a:
    registry:
      enabled: false
      agent-card:
        name: ProductAgent
        description: "商品咨询智能体，支持商品查询、价格查询、库存查询和参数对比"
        version: 1.0.0
        protocol-version: 0.3.0
        preferred-transport: JSONRPC
        url: http://localhost:${server.port}/a2a
        skills:
          - id: query-product
            name: 查询商品
            description: 根据关键词或分类查询商品信息
            tags: product,query
            examples:
              - 帮我查一下 iPhone 15 的价格
              - 有哪些手机在卖
          - id: query-price
            name: 查询价格
            description: 查询指定商品的价格和折扣信息
            tags: price,product
            examples:
              - 这个多少钱
              - 价格多少
          - id: check-stock
            name: 查询库存
            description: 查询指定商品是否有货
            tags: stock,product
            examples:
              - 有货吗
              - 库存还有吗
          - id: compare-product
            name: 商品对比
            description: 对比多个商品的参数和价格
            tags: product,compare
            examples:
              - 帮我对比这两款手机
              - 哪个更好

  # 数据源配置（PostgreSQL + JdbcTemplate）
  datasource:
    url: jdbc:postgresql://localhost:5433/a2a_system
    username: postgres
    password: ${POSTGRES_PASSWORD}  # ⚠️ 必须设置 POSTGRES_PASSWORD 环境变量
    driver-class-name: org.postgresql.Driver

  ai:
    # ⭐ DeepSeek 云端推理（主推理通道）
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-v4-flash
          temperature: 0.5
          max-tokens: 4096

    # ⭐ Ollama 本地模型配置（兜底降级通道）
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b
          temperature: 0.7

    alibaba:
      a2a:
        # Nacos 注册中心配置
        nacos:
          server-addr: 127.0.0.1:8848
          registry:
            enabled: true  # 启用 Nacos 注册（需要 Nacos 3.x 版本）
            namespace: ""  # 使用默认 namespace (public)
            group: DEFAULT_GROUP
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD}
            # Agent 特征元数据（用于 Router 智能路由）
            metadata:
              agent-type: product_agent
              capabilities: product_query,stock_check,price_query
              keywords: 商品,价格,库存,规格,颜色,分期,多少钱,有货,参数,对比
              priority: 10
              cache-ttl-seconds: "43200"    # ⭐ 回复缓存 TTL（秒）
              # ⭐ 版本管理
              version: "1.0.0"
              protocol-version: "v1"
              min-client-version: "1.0.0"
              supported-protocols: "a2a-v1"
        # A2A 服务端配置
        server:
          enabled: true
          card:
            name: product_agent
            description: "商品咨询智能体 - 查询商品信息、价格、库存状态等"
            version: "1.0.0"

    # ⭐ MCP Server 配置（内嵌模式）
    mcp:
      server:
        enabled: true  # 启用 MCP Server

# Actuator + Prometheus + Tracing 配置（监控端点）⭐
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,refresh  # ⭐ 添加 refresh 端点支持热重载
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
  
  # 分布式追踪配置 (Jaeger - Zipkin 兼容模式)
  tracing:
    sampling:
      probability: 0.3  # ⭐ 采样率 30%（开发环境已足够，生产环境可调整为 0.1）
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans  # ⭐ Jaeger 兼容 Zipkin 协议的端点

# ⭐ BGE embedding 配置（1.2GB 模型从项目级共享目录加载）
bge:
  model:
    path: ${BGE_MODEL_PATH:D:\\workspace\\SmartAssistant\\models\\bge-large-zh-v1.5.onnx}
  vocab:
    path: ${BGE_VOCAB_PATH:D:\\workspace\\SmartAssistant\\models\\tokenizer.json}

# Logging 配置（输出到文件，供 Loki 收集）⭐
logging:
  file:
    name: logs/${spring.application.name}.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB

# ⭐ LightRAG 实体关系抽取配置
product:
  rag:
    lightrag:
      enabled: true            # 查询侧「实体-关系图检索」Handler 开关（并入 RAG Pipeline）
      ingest-seed:
        enabled: true          # 启动时将种子文档（产品/订单）抽取进知识图谱（异步 best-effort）
