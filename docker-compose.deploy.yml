# SmartAssistant - 完整服务容器化部署
# 构建：docker compose -f docker-compose.deploy.yml build
# 启动：docker compose -f docker-compose.deploy.yml up -d
#
# 注意：需先创建 .env 文件并填入真实 API Key 和密码
# ⚠️ P0-③ 修复：补齐 postgres（根基础设施栈 docker-compose.yml 未含）；
#    补全各后端服务的容器网络覆盖（数据源 / Redis / Nacos 地址）。

services:
  # ========== 基础设施 ==========
  redis:
    extends:
      file: docker-compose.yml
      service: redis

  nacos:
    extends:
      file: docker-compose.yml
      service: nacos

  zipkin:
    extends:
      file: docker-compose.yml
      service: zipkin

  # ⚠️ 补齐 postgres（根 docker-compose.yml 基础设施栈未含，后端服务强依赖）
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-a2a_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./docs/database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql
    command: >
      -c shared_preload_libraries=vector
      -c max_connections=200
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-a2a_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 后端服务 ==========
  gateway:
    build:
      context: ./smart-assistant-gateway
      args:
        SERVICE_NAME: smart-assistant-gateway
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      JWT_SECRET: ${JWT_SECRET}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD}
    depends_on:
      nacos: { condition: service_healthy }
      redis: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
    restart: unless-stopped

  user:
    build:
      context: ./smart-assistant-user
      args:
        SERVICE_NAME: smart-assistant-user
    ports:
      - "8086:8086"
    environment:
      PORT: 8086
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-a2a_system}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD}
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/actuator/health"]
    restart: unless-stopped

  consumer:
    build:
      context: ./smart-assistant-consumer
      args:
        SERVICE_NAME: smart-assistant-consumer
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-a2a_system}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD}
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
    restart: unless-stopped

  router:
    build:
      context: ./smart-assistant-router
      args:
        SERVICE_NAME: smart-assistant-router
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-a2a_system}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD}
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
    restart: unless-stopped

  order:
    build:
      context: ./smart-assistant-order
      args:
        SERVICE_NAME: smart-assistant-order
    ports:
      - "8085:8085"
    environment:
      PORT: 8085
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-a2a_system}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD}
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/actuator/health"]
    restart: unless-stopped

  product:
    build:
      context: ./smart-assistant-product
      args:
        SERVICE_NAME: smart-assistant-product
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-a2a_system}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD}
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
    restart: unless-stopped

  general:
    build:
      context: ./smart-assistant-general
      args:
        SERVICE_NAME: smart-assistant-general
    ports:
      - "8087:8087"
    environment:
      PORT: 8087
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD}
    depends_on:
      nacos: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/actuator/health"]
    restart: unless-stopped

volumes:
  postgres-data:
