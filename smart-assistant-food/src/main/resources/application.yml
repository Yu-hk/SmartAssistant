server:
  port: 8084

spring:
  application:
    name: food-service

  # ⭐ 排除 Spring Security 自动配置 (内部服务无需认证)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  # Spring Cloud 配置
  cloud:
    compatibility-verifier:
      enabled: false  # 禁用版本兼容性检查（Spring Boot 3.4.x + Spring Cloud Alibaba 2023.x）
    
    # ⭐ 禁用 Nacos Config 导入检查
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: true
        server-addr: 127.0.0.1:8848
        namespace: ""
        group: DEFAULT_GROUP
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD}
        # 注册时携带元数据（供 Router 使用）
        metadata:
          agent-type: food_recommendation
          capabilities: cuisine_query,restaurant_recommendation,nearby_search
          keywords: 美食,餐厅,菜系,特色菜,吃什么,附近美食,推荐餐厅
          # ⭐ 版本管理
          version: "1.0.0"
          protocol-version: "v1"
          min-client-version: "1.0.0"
          supported-protocols: "a2a-v1"

  # 数据源配置（PostgreSQL + JdbcTemplate）
  datasource:
    url: jdbc:postgresql://localhost:5432/a2a_system
    username: postgres
    password: ${POSTGRES_PASSWORD}  # ⚠️ 必须设置 POSTGRES_PASSWORD 环境变量
    driver-class-name: org.postgresql.Driver

  # AI 模型配置
  ai:
    # DeepSeek 模型配置
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}  # DeepSeek API Key
      chat:
        options:
          model: deepseek-v4-flash  # ⭐ 非思考模式（官方已废弃 deepseek-chat）
          temperature: 0.1
          max-tokens: 512
          log-requests: true
          log-responses: true
          # V4 思维链配置
          reasoning-effort: max  # 思维强度：high | max

    # ⭐ DashScope Embedding 配置（用于向量检索）
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}  # 阿里云 DashScope API Key
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1024   # 与 DB vector(1024) 保持一致

    alibaba:
      a2a:
        # Nacos 注册中心配置
        nacos:
          server-addr: 127.0.0.1:8848
          registry:
            enabled: true  # 启用 Nacos 注册（需要 Nacos 3.x 版本）
            namespace: ""  # 使用默认 namespace (public)
            group: DEFAULT_GROUP
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD}
            # Agent 特征元数据（用于 Router 智能路由）
            metadata:
              agent-type: food_recommendation
              capabilities: cuisine_query,restaurant_recommendation,nearby_search
              keywords: 美食,餐厅,菜系,特色菜,吃什么,附近美食,推荐餐厅
              cuisine-types: 川菜,粤菜,鲁菜,苏菜,浙菜,闽菜,湘菜,徽菜,火锅,烧烤,日料,韩餐,西餐
              support-location: true
              priority: 10
              # ⭐ 版本管理
              version: "1.0.0"
              protocol-version: "v1"
              min-client-version: "1.0.0"
              supported-protocols: "a2a-v1"
        # A2A 服务端配置
        server:
          enabled: true
          card:
            name: food_recommendation  # ⭐ 与路由规则中的 agent_name 保持一致
            description: "美食推荐智能体 - 根据城市、菜系和位置推荐附近的餐厅"
            version: "1.0.0"

    # ⭐ MCP Server 配置（内嵌模式）
    mcp:
      server:
        enabled: true  # 启用 MCP Server

# 高德地图 API 配置（用于搜索附近娱乐项目）
amap:
  api:
    key: ${AMAP_API_KEY:}  # 请替换为实际的高德地图 API Key，申请地址：https://lbs.amap.com/

# Actuator + Prometheus + Tracing 配置（监控端点）⭐
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,refresh  # ⭐ 添加 refresh 端点支持热重载
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
  
  # 分布式追踪配置 (Jaeger - Zipkin 兼容模式)
  tracing:
    sampling:
      probability: 0.3  # ⭐ 采样率 30%（开发环境已足够，生产环境可调整为 0.1）
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans  # ⭐ Jaeger 兼容 Zipkin 协议的端点

# Logging 配置（输出到文件，供 Loki 收集）⭐
logging:
  file:
    name: logs/${spring.application.name}.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
