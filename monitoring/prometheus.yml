# SmartAssistant Prometheus 配置
# 自动发现并采集所有微服务指标
global:
  scrape_interval:     15s
  evaluation_interval: 15s

# Alertmanager 配置（预留）
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# 规则文件（预留告警规则）
rule_files:
  # - "alerts.yml"

scrape_configs:
  # ========== SmartAssistant 微服务 ==========
  - job_name: 'smartassistant-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels: { service: 'api-gateway', team: 'smartassistant' }

  - job_name: 'smartassistant-consumer'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels: { service: 'consumer-service', team: 'smartassistant' }

  - job_name: 'smartassistant-router'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels: { service: 'router-service', team: 'smartassistant' }

  - job_name: 'smartassistant-product'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels: { service: 'product-service', team: 'smartassistant' }

  - job_name: 'smartassistant-order'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8085']
        labels: { service: 'order-service', team: 'smartassistant' }

  - job_name: 'smartassistant-user'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8086']
        labels: { service: 'user-service', team: 'smartassistant' }

  # ========== Docker 基础设施 ==========
  - job_name: 'nacos'
    metrics_path: '/nacos/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8848']
        labels: { service: 'nacos', infra: 'true' }

  # ========== Prometheus 自身 ==========
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
