server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # API Gateway Logs
  - job_name: a2a-gateway
    static_configs:
      - targets:
          - localhost
        labels:
          job: a2a-logs
          service: api-gateway
          __path__: /var/log/services/api-gateway.log*
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}'
          max_wait_time: 3s

  # Consumer Service Logs
  - job_name: a2a-consumer
    static_configs:
      - targets:
          - localhost
        labels:
          job: a2a-logs
          service: consumer-service
          __path__: /var/log/services/consumer-service.log*
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}'
          max_wait_time: 3s

  # Router Service Logs
