# SmartAssistant Alertmanager 配置
# 接收 Prometheus 推送的告警，按 severity 路由到钉钉/企微/邮件
#
# ⚠️ 凭证处理：下方 webhook URL 中的 token / key 为占位符。
#   生产部署时通过部署脚本 sed 注入真实值（或设置 docker-compose 中的
#   ALERTMANAGER_DINGTALK_TOKEN / ALERTMANAGER_WECHAT_KEY 后在镜像内替换），
#   切勿将真实 token 提交入库。
global:
  resolve_timeout: 5m

route:
  receiver: 'dingtalk'
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # critical -> 钉钉
    - receiver: 'dingtalk'
      matchers:
        - severity = "critical"
      group_wait: 10s
      repeat_interval: 1h
    # warning -> 企业微信
    - receiver: 'wechat'
      matchers:
        - severity = "warning"
      repeat_interval: 6h
    # info -> 邮件
    - receiver: 'email'
      matchers:
        - severity = "info"
      repeat_interval: 12h

receivers:
  # ⚠️ 注意：Alertmanager 原生 webhook 仅推送标准告警 JSON（非钉钉/企微原生报文）。
  # 真实接入钉钉/企微时，需将 url 指向一个「格式转换桥接服务」
  # （接收标准 JSON → 拼装 {"msgtype":"text","text":{"content":...}} 再转发官方机器人），
  # 或在自建镜像中启用 alertmanager 的 dingtalk_configs / wechat_configs 扩展。
  - name: 'dingtalk'
    webhook_configs:
      - url: 'https://oapi.dingtalk.com/robot/send?access_token=REPLACE_WITH_DINGTALK_TOKEN'
        send_resolved: true

  - name: 'wechat'
    webhook_configs:
      - url: 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=REPLACE_WITH_WECHAT_KEY'
        send_resolved: true

  - name: 'email'
    email_configs:
      - to: 'admin@example.com'
        from: 'alertmanager@example.com'
        smarthost: 'smtp.example.com:587'
        require_tls: true
        send_resolved: true

# 默认不抑制；如需维护窗口静默，访问 http://localhost:9093 的 Silences 页面
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
