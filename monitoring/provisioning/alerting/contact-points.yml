apiVersion: 1

contactPoints:
  - orgId: 1
    name: 钉钉告警
    receivers:
      - uid: dingtalk-1
        type: dingding
        settings:
          url: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_DINGTALK_TOKEN"
          message: "{{ .CommonAnnotations.summary }}"
          mentionAll: false
        disableResolveMessage: false

  - orgId: 1
    name: 企业微信告警
    receivers:
      - uid: wechat-1
        type: webhook
        settings:
          url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_WECHAT_KEY"
          httpMethod: POST
          username: ""
          password: ""
        disableResolveMessage: false

  - orgId: 1
    name: 邮件告警
    receivers:
      - uid: email-1
        type: email
        settings:
          addresses: "admin@example.com;ops@example.com"
          singleEmail: false
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: 钉钉告警
    group_by:
      - alertname
      - service
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: 钉钉告警
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
      
      - receiver: 企业微信告警
        matchers:
          - severity = warning
        group_wait: 1m
        repeat_interval: 6h
      
      - receiver: 邮件告警
        matchers:
          - severity = info
        group_wait: 5m
        repeat_interval: 12h
