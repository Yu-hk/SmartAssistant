groups:
  - name: sql_performance_alerts
    interval: 60s
    rules:
      # 1. 慢查询告警
      - alert: HighSlowQueryRate
        expr: rate(sql_slow_queries_count[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "慢查询速率过高"
          description: "过去5分钟平均每秒 {{ $value }} 个慢查询，阈值: 0.1/秒"
          runbook_url: "http://wiki.internal/runbooks/slow-query"

      # 2. 缓存命中率低告警
      - alert: LowCacheHitRate
        expr: db_cache_hit_rate_percent < 80
        for: 10m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "数据库缓存命中率过低"
          description: "当前缓存命中率 {{ $value }}%，低于 80% 阈值"
          runbook_url: "http://wiki.internal/runbooks/cache-hit-rate"

      # 3. Agent SQL 失败率告警
      - alert: HighAgentSqlFailureRate
        expr: rate(sql_agent_failure_count[5m]) / (rate(sql_agent_success_count[5m]) + rate(sql_agent_failure_count[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          team: ai-agent
        annotations:
          summary: "Agent SQL 执行失败率过高"
          description: "过去5分钟失败率 {{ $value | humanizePercentage }}，超过 5% 阈值"
          runbook_url: "http://wiki.internal/runbooks/agent-sql-failure"

      # 4. 数据库连接池耗尽告警
      - alert: DatabaseConnectionPoolExhausted
        expr: db_connections_waiting > 10
        for: 2m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "数据库连接池即将耗尽"
          description: "等待连接的请求数: {{ $value }}，建议增加最大连接数"
          runbook_url: "http://wiki.internal/runbooks/connection-pool"

      # 5. 表全表扫描过多告警
      - alert: ExcessiveSequentialScans
        expr: increase(db_table_seq_scans{table="chat_messages"}[1h]) > 1000
        for: 15m
        labels:
          severity: warning
          team: database
        annotations:
          summary: "chat_messages 表全表扫描过多"
          description: "过去1小时全表扫描次数: {{ $value }}，建议检查索引或优化查询"
          runbook_url: "http://wiki.internal/runbooks/sequential-scans"

      # 6. 物化视图刷新失败告警
      - alert: MaterializedViewRefreshFailed
        expr: absent(up{job="consumer-service"} == 1)
        for: 5m
        labels:
          severity: critical
          team: database
        annotations:
          summary: "Consumer 服务不可用"
          description: "物化视图可能无法按时刷新，请检查服务状态"
          runbook_url: "http://wiki.internal/runbooks/service-down"

      # 7. 数据库表空间不足告警
      - alert: DatabaseTablespaceLow
        expr: db_table_size_bytes{table="chat_messages"} > 10737418240  # 10GB
        for: 1h
        labels:
          severity: warning
          team: database
        annotations:
          summary: "chat_messages 表大小超过 10GB"
          description: "当前表大小: {{ $value | humanize1024 }}，建议归档旧数据"
          runbook_url: "http://wiki.internal/runbooks/tablespace-low"

      # 8. SQL 缓存命中率低告警
      - alert: LowSqlCacheHitRate
        expr: rate(sql_cache_hits_count[5m]) / (rate(sql_cache_hits_count[5m]) + rate(sql_cache_misses_count[5m])) < 0.5
        for: 10m
        labels:
          severity: info
          team: performance
        annotations:
          summary: "SQL 查询缓存命中率低"
          description: "缓存命中率 {{ $value | humanizePercentage }}，低于 50%"
          runbook_url: "http://wiki.internal/runbooks/sql-cache"
