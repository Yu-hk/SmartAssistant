server:
  port: 8082
  # ⭐ Tomcat 线程池优化
  tomcat:
    threads:
      max: 200          # 最大线程数（默认200）
      min-spare: 20     # 最小空闲线程数（默认10）
    accept-count: 100   # 等待队列长度（默认100）
    max-connections: 8192  # 最大连接数
  # ⭐ 设置 Tomcat URI 编码
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: consumer-service

  # ⭐ MVC 异步请求超时（任务拆解需要更长时间）
  mvc:
    async:
      request-timeout: 120000  # 2 分钟

  # ⭐ HTTP 编码配置
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  # 允许 Bean 定义覆盖（解决同名 Repository 冲突）
  main:
    allow-bean-definition-overriding: true

  # 禁用 Spring Cloud 兼容性检查（Spring Boot 3.4.x 需要）
  cloud:
    compatibility-verifier:
      enabled: false
    
    # ⭐ Nacos 服务发现配置
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: ""
        group: DEFAULT_GROUP
        enabled: true
        metadata:
          instance-id: consumer-service-8082  # 实例标识
          version: v1                         # 版本标识

  # 数据源配置（PostgreSQL + MyBatis）
  datasource:
    url: jdbc:postgresql://localhost:5432/a2a_system
    username: ${POSTGRES_USER:postgres}  # ⭐ 使用统一的应用用户，权限控制在应用层实现
    password: ${POSTGRES_PASSWORD:postgres123}  # ⭐ 生产环境请使用环境变量或密钥管理服务
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20     # ⭐ 最大连接池大小（从10增加到20）
      minimum-idle: 5           # ⭐ 最小空闲连接（从2增加到5）
      idle-timeout: 30000       # 空闲超时 30秒
      connection-timeout: 20000 # 连接超时 20秒
      max-lifetime: 1800000     # ⭐ 连接最大生命周期 30分钟
      leak-detection-threshold: 60000  # ⭐ 连接泄漏检测阈值 60秒

  # MyBatis Plus 配置
  mybatis-plus:
    mapper-locations: classpath*:/mapper/**/*.xml
    type-aliases-package: com.example.smartassistant.consumer.entity
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
      # ⭐ 注册 TypeHandler
      type-handlers-package: com.baomidou.mybatisplus.extension.handlers,com.example.smartassistant.consumer.handler
    global-config:
      db-config:
        id-type: auto

  # DashScope Chat API 配置 (用于意图识别和偏好提取)
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}  # 阿里云 DashScope API Key，申请地址：https://dashscope.console.aliyun.com/
      chat:
        options:
          model: qwen-plus  # Chat 模型
      embedding:
        enabled: true
        options:
          model: text-embedding-v4   # 升级从 v2 → v4，输出 1024 维向量
          dimensions: 1024
    
    # ⭐ MCP Server 配置（内嵌在 Consumer 中）
    mcp:
      server:
        enabled: true  # ⭐ 启用内嵌 MCP Server
        name: smart-assistant-database-mcp
        version: 1.0.0
        type: sync
        protocol: sse  # ⭐ 使用 SSE 协议
        sse-endpoint: /sse  # ⭐ SSE 端点路径
        sse-message-endpoint: /mcp/message  # ⭐ SSE 消息端点

  # 异步配置
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: a2a-async-

  # Redis 配置
  data:
    redis:
      host: localhost  # Docker 容器映射到 localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# ⭐ Spring Cache 配置
cache:
  type: redis
  redis:
    time-to-live: 300000  # 默认 TTL 5分钟
    cache-null-values: false  # 不缓存 null 值
    key-prefix: "a2a:cache:"  # Key 前缀
    use-key-prefix: true
  
  # ⭐ Phase 1 & 2: 答案缓存配置
  answer:
    l1-ttl-minutes: 2  # L1 Redis 短期缓存 TTL（从 5 分钟降低到 2 分钟）
  
  # ⭐ Phase 2: 语义缓存配置
  semantic:
    similarity-threshold: 0.85  # 相似度阈值（从 0.9 降低到 0.85，提高命中率）
    top-k: 3  # 返回最相似的 K 条记录
    max-age-hours: 24  # 最大缓存年龄（小时）
  
  # ⭐ 方案C: 向量检索缓存配置
  vector-search:
    ttl-minutes: 10  # 向量检索结果缓存 TTL
    similarity-threshold: 0.85  # 与 semantic 保持一致
    top-k: 3  # 与 semantic 保持一致

# Router Service 配置
router:
  service:
    url: http://localhost:8083       # Router Service 地址

# ⭐ 线程池配置（消除硬编码）
thread-pool:
  # 通用异步任务线程池
  async-task:
    core-size: 5              # 核心线程数
    max-size: 10              # 最大线程数
    queue-capacity: 200       # 队列容量
    keep-alive-seconds: 60    # 空闲线程存活时间（秒）
  
  # 定时任务线程池
  scheduled-task:
    core-size: 1              # 核心线程数
    max-size: 3               # 最大线程数
    queue-capacity: 50        # 队列容量
  
  # 异步路由日志线程池
  async-route:
    core-size: 2              # 核心线程数
    max-size: 5               # 最大线程数
    queue-capacity: 100       # 队列容量
    keep-alive-seconds: 120   # 空闲线程存活时间（秒）
  
  # 异步 Embedding 线程池
  async-embedding:
    queue-capacity: 50        # 队列容量（core/max 根据 CPU 核心数动态计算）

# ⭐ 定时任务调度配置（消除硬编码）
scheduler:
  session-cleanup-interval: 60000              # 会话清理间隔（毫秒），默认 1 分钟
  sql-metrics-interval: 60000                  # SQL 指标收集间隔（毫秒），默认 1 分钟
  sql-performance-check-interval: 300000       # SQL 性能检查间隔（毫秒），默认 5 分钟
  sql-slow-query-analysis-interval: 3600000    # 慢查询分析间隔（毫秒），默认 1 小时

# ⭐ SQL 监控阈值配置（消除硬编码）
sql:
  monitor:
    slow-query-threshold-ms: 1000           # 慢查询阈值（毫秒），默认 1 秒
    index-usage-min-scans: 100              # 索引使用率统计最小扫描次数
    index-usage-low-threshold: 50           # 索引使用率低阈值（百分比）

# ⭐ Prompt 配置（监控 + 灰度发布）
prompt:
  monitor:
    size-bucket-1: 500                      # 大小分布区间1（字节）
    size-bucket-2: 1000                     # 大小分布区间2（字节）
    size-bucket-3: 2000                     # 大小分布区间3（字节）
    size-bucket-4: 5000                     # 大小分布区间4（字节）
  gray-release:
    enabled: false              # 是否启用灰度发布
    percentage: 0               # 灰度比例（0-100）
    whitelist-users: []         # 白名单用户 ID 列表
    blacklist-users: []         # 黑名单用户 ID 列表

# ⭐ 建议配置（消除硬编码）
suggestions:
  max-count: 5                    # 最大推荐数量
  min-confidence: 0.6             # 最小置信度

# ⭐ 语音识别配置
speech:
  recognition:
    provider: dashscope           # 语音识别提供商：dashscope | local
    language: zh-CN               # 默认语言：zh-CN, en-US, ja-JP, ko-KR
    max-file-size-mb: 10          # 最大音频文件大小（MB）
    supported-formats: wav,mp3,m4a,flac,ogg  # 支持的音频格式
suggestion:
  max-count: 5                              # 最大建议数量

# ⭐ Travel RAG 配置
travel:
  rag:
    enabled: false                          # 是否启用 Travel RAG
    top-k: 3                               # 返回 Top-K 相关片段
    similarity-threshold: 0.5               # 相似度阈值（低于此值过滤）
    chunk-size: 300                         # 分块大小（字符数）
    chunk-overlap: 50                       # 分块重叠字符数

# ⭐ HanLP 配置
hanlp:
  data-path: ${HANLP_DATA_PATH:}           # HanLP 数据文件目录（可选，不填则使用默认）
  # 示例: D:/workspace/SmartAssistant/hanlp-data
  # 如不配置，HanLP 会自动从以下路径查找：
  #   1. 环境变量 HANLP_DATA_PATH
  #   2. 系统属性 hanlp.home
  #   3. classpath:/data 或 classpath:/hanlp
  #   4. 用户目录 ~/.hanlp

# ⭐ Resilience4j 配置（熔断 + 限流 + 重试）
resilience4j:
  # 熔断器配置
  circuitbreaker:
    instances:
      routerService:
        sliding-window-size: 10          # 滑动窗口大小（10个请求）
        sliding-window-type: COUNT_BASED # 基于计数
        minimum-number-of-calls: 5       # 最小调用次数
        failure-rate-threshold: 50       # 失败率阈值 50%
        wait-duration-in-open-state: 30s # 开启状态等待时间
        permitted-number-of-calls-in-half-open-state: 3 # 半开状态允许调用数
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true  # 注册健康指标
      
      agentService:
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
  
  # 限流器配置
  ratelimiter:
    instances:
      routerRateLimiter:
        limit-for-period: 50             # 每个周期允许的请求数
        limit-refresh-period: 1s         # 周期刷新时间
        timeout-duration: 2s             # 获取许可的超时时间
      
      chatRateLimiter:
        limit-for-period: 30             # Chat 接口更严格
        limit-refresh-period: 1s
        timeout-duration: 3s
  
  # 重试配置
  retry:
    instances:
      routerRetry:
        max-attempts: 2                  # 最大重试次数
        wait-duration: 500ms             # 重试间隔
        enable-exponential-backoff: true # 指数退避
        exponential-backoff-multiplier: 2 # 退避倍数
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException

# JWT 配置
jwt:
  secret: ${JWT_SECRET:a2a-demo-secret-key-for-jwt-token-generation-2026-very-long}  # ⭐ 优先从环境变量 JWT_SECRET 读取
  expiration: 3600000  # 1 小时（毫秒）
  refresh-expiration: 86400000  # 24 小时（毫秒）

# Session 配置
session:
  enabled: true  # 是否启用 Redis Session 验证（设为 false 可跳过 Redis）
  ttl-days: 7    # Session 有效期（天）
  db-storage-enabled: true  # ⭐ 启用数据库存储（JSONB 问题已修复）
  timeout-ms: 1800000  # ⭐ 会话超时时间（毫秒），默认 30 分钟

# CORS 跨域配置
cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:3001
    - http://127.0.0.1:3000
    - http://127.0.0.1:3001
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# ⭐ Prompt 配置（监控 + 灰度发布）- 已合并到上方

# ⭐ 对话上下文压缩配置
conversation:
  compression:
    enabled: true                      # 是否启用压缩
    max-rounds-before-compress: 10     # 超过 10 轮开始压缩
    max-chars-before-compress: 2000    # 超过 2000 字符开始压缩
    max-tokens-before-compress: 1500   # 超过 1500 估算 token 开始压缩
    keep-recent-rounds: 5              # 压缩后保留最近 5 轮
    strategy: auto                     # 压缩策略：auto / truncate / extract / llm
    llm-summary-max-chars: 200         # LLM 摘要最大字数
    extract-max-rounds: 10             # 关键信息提取时保留的最大轮数
    token-estimate-ratio: 0.8          # 中文 Token 估算系数
    cache-enabled: true                # 是否启用压缩结果 Redis 缓存
    cache-ttl-minutes: 30              # 缓存 TTL（分钟）

# Actuator + Prometheus + Tracing 配置 ⭐
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,ratelimiters,retries,refresh  # ⭐ 添加 refresh 端点支持热重载
  endpoint:
    prometheus:
      enabled: true  # 启用 Prometheus 端点
    health:
      show-details: always  # 显示详细健康信息
    circuitbreakers:
      enabled: true  # 启用熔断器端点
    ratelimiters:
      enabled: true  # 启用限流器端点
  metrics:
    export:
      prometheus:
        enabled: true  # 启用 Prometheus 指标导出
    tags:
      application: ${spring.application.name}  # 添加应用标签
  
  # 分布式追踪配置 (Jaeger - Zipkin 兼容模式)
  tracing:
    sampling:
      probability: 1.0  # ⭐ 启用全量采样，生产环境可调整为 0.1-0.3
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans  # ⭐ Jaeger 兼容 Zipkin 协议的端点

# Logging 配置（输出到文件，供 Loki 收集）⭐
logging:
  file:
    name: logs/${spring.application.name}.log  # Windows 环境：logs\consumer-service.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
