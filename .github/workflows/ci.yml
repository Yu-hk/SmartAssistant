# SmartAssistant CI Pipeline
# 每次 push 到 main 或 PR 时自动执行：
# 1. 编译所有模块
# 2. 运行全部测试（CI 内置 Redis）
# 3. 上传测试报告

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REDIS_PASSWORD: redis123

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java: [21]
    
    # ⭐ 启动 Redis 供集成测试使用
    services:
      redis:
        image: redis:7.2.4
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a redis123 ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile all modules
        run: ./mvnw compile -q
        env:
          REDIS_PASSWORD: redis123

      - name: Run all tests
        run: ./mvnw test -q
        env:
          REDIS_PASSWORD: redis123

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/'
