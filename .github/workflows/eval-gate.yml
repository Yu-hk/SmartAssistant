name: RAG / Agent Evaluation Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # 全模块编译完整性检查（不含测试，最快反馈构建是否破坏）
  compile-all:
    name: Compile all modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Maven compile (all modules)
        run: mvn -B compile

  # 评测闭环质量门禁 —— 核心回归卡点
  # 对黄金测试集执行离线 RAG 评测 + 门禁判定（阈值 + 基线回归），失败则阻断构建。
  # 纯内存计算，无需 Redis/PG 等基础设施，可在任意 Runner 确定性运行。
  eval-gate:
    name: Evaluation gate (golden suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run evaluation gate
        run: >-
          mvn -B -pl smart-assistant-common test
          -Dtest=GoldenSuiteEvalGateTest
          -DfailIfNoTests=false
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-gate-report
          path: smart-assistant-common/target/eval-reports/
          if-no-files-found: warn

# 说明：
# 1. 本工作流是「评测闭环接入 CI」的核心卡点。请在 GitHub 分支保护规则中将
#    "Evaluation gate (golden suite)" 设为必需状态检查（required status check），
#    才能在 PR 中真正阻断质量回归。
# 2. 重新生成基线（仅人工确认质量变化后执行）：
#    本地运行 GoldenSuiteEvalGate.main 并将生成的 src/test/resources/eval-baseline.json 提交。
# 3. 其他模块依赖 Redis/PG 的集成测试不在本工作流范围内（需 service container，另行编排）。
