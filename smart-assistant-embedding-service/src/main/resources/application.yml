server:
  port: 8091
  shutdown: graceful
spring:
  lifecycle:
    timeout-per-shutdown-phase: "30s"
  application:
    name: embedding-service
  main:
    banner-mode: off

  # Nacos 配置
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        import-check:
          enabled: false

# BGE 模型路径（只在 embedding-service 中实际加载）
bge:
  model:
    path: ${BGE_MODEL_PATH:/workspace/SmartAssistant/models/bge-large-zh-v1.5.onnx}
  vocab:
    path: ${BGE_VOCAB_PATH:/workspace/SmartAssistant/models/tokenizer.json}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
