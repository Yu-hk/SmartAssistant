# SmartAssistant 高可用部署（多副本 + 负载均衡）
# 使用: docker compose -f docker-compose-infra.yml -f docker-compose.ha.yml up -d
# 停止: docker compose -f docker-compose-infra.yml -f docker-compose.ha.yml down
#
# 前提: 基础设施（Redis、Nacos、PG）已通过 docker-compose-infra.yml 启动
#
# 架构说明:
# - 2 个 Nginx（负载均衡器，主备）
# - 3 个 Router 实例（无状态，共享 Redis 状态）
# - 2 个 Consumer 实例（无状态）
# - 其他服务单实例
#
# Router 高可用原理:
# - 所有 Router 实例共享同一个 Redis（决策缓存、SSE 事件、AgentEventBus）
# - Router 通过 Nacos 服务注册，Consumer 使用负载均衡调用
# - 任意 Router 实例宕机不影响整体服务
#
# Nginx 负载均衡:
# - Router: http://router-ha:8083 → 轮询到 3 个 Router 实例
# - Consumer: http://consumer-ha:8082 → 轮询到 2 个 Consumer 实例

services:
  # === Nginx 负载均衡器 ===
  nginx-router:
    image: nginx:1.25-alpine
    container_name: smart-nginx-router
    ports:
      - "8083:8083"   # Router 负载均衡入口
    volumes:
      - ./deploy/nginx-router.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - smart-assistant-router-1
      - smart-assistant-router-2
      - smart-assistant-router-3
    restart: unless-stopped
    networks:
      - smart-network

  nginx-consumer:
    image: nginx:1.25-alpine
    container_name: smart-nginx-consumer
    ports:
      - "8082:8082"   # Consumer 负载均衡入口
    volumes:
      - ./deploy/nginx-consumer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - smart-assistant-consumer-1
      - smart-assistant-consumer-2
    restart: unless-stopped
    networks:
      - smart-network

  # === Router 多副本（3 实例） ===
  smart-assistant-router-1:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-router
    container_name: smart-router-1
    ports:
      - "8083-1:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - PORT=8083
      - SPRING_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/a2a_system
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_USERNAME=${NACOS_USERNAME:-nacos}
      - SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD=${NACOS_PASSWORD}
    depends_on:
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - smart-network

  smart-assistant-router-2:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-router
    container_name: smart-router-2
    ports:
      - "8083-2:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - PORT=8083
      - SPRING_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/a2a_system
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_USERNAME=${NACOS_USERNAME:-nacos}
      - SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD=${NACOS_PASSWORD}
    depends_on:
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - smart-network

  smart-assistant-router-3:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-router
    container_name: smart-router-3
    ports:
      - "8083-3:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - PORT=8083
      - SPRING_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/a2a_system
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_USERNAME=${NACOS_USERNAME:-nacos}
      - SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD=${NACOS_PASSWORD}
    depends_on:
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - smart-network

  # === Consumer 多副本（2 实例） ===
  smart-assistant-consumer-1:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-consumer
    container_name: smart-consumer-1
    ports:
      - "8082-1:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - PORT=8082
      - SPRING_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/a2a_system
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_USERNAME=${NACOS_USERNAME:-nacos}
      - SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD=${NACOS_PASSWORD}
      # Consumer 通过 Router 负载均衡入口调用
      - ROUTER_SERVICE_URL=http://nginx-router:8083
    depends_on:
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
    restart: unless-stopped
    networks:
      - smart-network

  smart-assistant-consumer-2:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-consumer
    container_name: smart-consumer-2
    ports:
      - "8082-2:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - PORT=8082
      - SPRING_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/a2a_system
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_USERNAME=${NACOS_USERNAME:-nacos}
      - SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD=${NACOS_PASSWORD}
      - ROUTER_SERVICE_URL=http://nginx-router:8083
    depends_on:
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
    restart: unless-stopped
    networks:
      - smart-network

networks:
  smart-network:
    external: true
