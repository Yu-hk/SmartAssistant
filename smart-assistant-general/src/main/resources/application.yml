server.shutdown: graceful  # ⭐ 优雅关闭，等待处理中的请求完成
server:
  port: 8087

spring:
  application:
    name: general-agent-service

  # ⭐ 虚拟线程全局启用
  threads:
    virtual:
      enabled: true

  main:
    allow-bean-definition-overriding: true  # ⭐ 允许覆盖 auto-config

  # DeepSeek 模型配置（V4-Flash 最新模型）
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        options:
          model: deepseek-v4-flash
          temperature: 0.5
          max-tokens: 4096

# Actuator + Prometheus + Tracing 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development

  # 分布式追踪
  tracing:
    sampling:
      probability: 0.3  # 采样率 30%（开发环境已足够）
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans

# Logging 配置
logging:
  file:
    name: logs/${spring.application.name}.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
