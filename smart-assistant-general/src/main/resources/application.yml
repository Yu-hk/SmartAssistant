server.shutdown: graceful  # ⭐ 优雅关闭，等待处理中的请求完成
spring.lifecycle.timeout-per-shutdown-phase: "30s"
server:
  port: 8087

spring:
  # ⭐ JDK 21 虚拟线程：每请求一线程 + @Async/@Scheduled 默认走虚拟线程（I/O 阻塞型服务收益显著）
  threads:
    virtual:
      enabled: true
  application:
    name: general-agent-service

  # 排除 Spring Security 自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  # Spring Cloud 配置
  cloud:
    compatibility-verifier:
      enabled: false

    # Nacos 服务发现
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: true
        server-addr: 127.0.0.1:8848
        namespace: ""
        group: DEFAULT_GROUP
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD}
        metadata:
          agent-type: general_chat
          capabilities: chat,qa,entertainment,companion,image_analysis,image_generation
          priority: 100  # 最低优先级，作为兜底；无 keywords 约束，仅通过 fallback 匹配
          cache-ttl-seconds: "7200"    # ⭐ 回复缓存 TTL（秒），闲聊类 2h
          always-cache-reply: "true"   # ⭐ 首次即缓存回复，天气/新闻等可稳定复用
          version: "1.0.0"
          protocol-version: "v1"
          min-client-version: "1.0.0"
          supported-protocols: "a2a-v1"

  # DeepSeek 模型配置（V4-Flash 最新模型）
  ai:
    # ⭐ DeepSeek 云端推理
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: deepseek-v4-flash
          temperature: 0.5
          max-tokens: 4096

    # ⭐ Ollama 本地模型配置（保留兼容配置，按依赖存在情况启用）
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b
          temperature: 0.7

    # DashScope API（A2A 发现依赖）
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}

    alibaba:
      a2a:
        # Nacos 注册中心
        nacos:
          server-addr: 127.0.0.1:8848
          registry:
            enabled: true
            namespace: ""
            group: DEFAULT_GROUP
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD}
            metadata:
              agent-type: general_chat
              capabilities: chat,qa,entertainment,companion,image_analysis,image_generation
              keywords: ""  # ⭐ 无 keywords 约束，纯 fallback 兜底
              priority: 100  # 最低优先级，作为兜底
              cache-ttl-seconds: "7200"    # ⭐ 回复缓存 TTL（秒）
              version: "1.0.0"
              protocol-version: "v1"
              min-client-version: "1.0.0"
              supported-protocols: "a2a-v1"
        # A2A 服务端配置
        server:
          enabled: true
          card:
            name: general_chat
            description: "通用对话智能体 - 闲聊、问答、帮助，当其他专业服务无法处理时作为兜底"
            version: "1.0.0"

# ⭐ Nacos A2A Registry 配置（AgentCard 注册）
# 默认关闭，开启后自动向 Nacos A2A Registry 注册 GeneralChat AgentCard。
nacos:
  a2a:
    registry:
      enabled: false
      agent-card:
        name: GeneralChat
        description: "通用对话智能体，支持闲聊问答、娱乐陪伴、图片分析和图片生成"
        version: 1.0.0
        protocol-version: 0.3.0
        preferred-transport: JSONRPC
        url: http://localhost:${server.port}/a2a
        skills:
          - id: chat
            name: 闲聊对话
            description: 进行自由对话、聊天和问答
            tags: chat,qa
            examples:
              - 你好
              - 今天天气怎么样
          - id: image-analysis
            name: 图片分析
            description: 分析用户上传的图片内容
            tags: image,analysis
            examples:
              - 这张图里有什么
              - 分析这张图片
          - id: image-generation
            name: 图片生成
            description: 根据文字描述生成图片
            tags: image,generate
            examples:
              - 帮我画一只猫
              - 生成一张风景图

# Actuator + Prometheus + Tracing 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development

  # 分布式追踪
  tracing:
    sampling:
      probability: 0.3  # 采样率 30%（开发环境已足够）
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans

# Logging 配置
logging:
  file:
    name: logs/${spring.application.name}.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB

# ⭐ 脚本沙箱：executeScript 工具的运行时资源限制 + 超时熔断（防 CPU/内存耗尽 DoS）
sandbox:
  script:
    enabled: true
    timeout-ms: 2000            # 单次脚本执行超时（毫秒），超时熔断释放请求线程
    max-script-length: 2000     # 脚本总字符上限
    max-lines: 50               # 最大语句行数
    max-variables: 50           # 最大变量数（防内存膨胀）
    max-expression-length: 200  # 单行表达式字符上限
    max-output-length: 8000     # 输出字符上限（防输出膨胀）
