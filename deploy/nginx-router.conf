# Nginx 负载均衡 — Router 多副本
upstream router_cluster {
    # 轮询策略（默认）
    server smart-assistant-router-1:8083 max_fails=3 fail_timeout=30s;
    server smart-assistant-router-2:8083 max_fails=3 fail_timeout=30s;
    server smart-assistant-router-3:8083 max_fails=3 fail_timeout=30s;
}

server {
    listen 8083;
    server_name _;

    # 健康检查端点
    location /actuator/health {
        proxy_pass http://router_cluster;
        proxy_http_version 1.1;
        proxy_read_timeout 5s;
    }

    # Router API
    location / {
        proxy_pass http://router_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $http_x_request_id;

        # SSE 支持（长连接不断开）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }
}
