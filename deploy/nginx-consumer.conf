# Nginx 负载均衡 — Consumer 多副本
upstream consumer_cluster {
    server smart-assistant-consumer-1:8082 max_fails=3 fail_timeout=30s;
    server smart-assistant-consumer-2:8082 max_fails=3 fail_timeout=30s;
}

server {
    listen 8082;
    server_name _;

    # 健康检查端点
    location /actuator/health {
        proxy_pass http://consumer_cluster;
        proxy_http_version 1.1;
        proxy_read_timeout 5s;
    }

    # Consumer API（SSE 流式接口）
    location / {
        proxy_pass http://consumer_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $http_x_request_id;

        # SSE 流式支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;  # SSE 长连接
        proxy_send_timeout 30s;
    }
}
