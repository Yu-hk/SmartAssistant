server {
    listen 80;
    server_name _;

    # ==========================================
    # 安全头
    # ==========================================
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ==========================================
    # 前端静态文件
    # ==========================================
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ==========================================
    # API 反向代理 — 转发到 Gateway
    # ==========================================
    location /api/ {
        proxy_pass http://smart-gateway:8081/assistant/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持（Consumer 使用 SSE 流式输出）
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ==========================================
    # 健康检查端点（无需认证）
    # ==========================================
    location /healthz {
        proxy_pass http://smart-gateway:8081/actuator/health;
        proxy_http_version 1.1;
        proxy_read_timeout 5s;
        access_log off;
    }

    # ==========================================
    # 前端路由（SPA 支持 — 所有非 API 路径返回 index.html）
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # 静态资源缓存（指纹文件名）
    # ==========================================
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==========================================
    # 监控前端（如果部署 Grafana，可开启）
    # ==========================================
    # location /grafana/ {
    #     proxy_pass http://smart-grafana:3000/;
    #     proxy_set_header Host $host;
    # }
}

