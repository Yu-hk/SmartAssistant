# =============================================================================
# SmartAssistant - 生产环境 Docker 部署
# =============================================================================
# 前置条件：
#   1. 安装 Docker & Docker Compose v2
#   2. 从项目根目录构建：mvn clean package -DskipTests
#   3. 前端构建：cd frontend && npm run build
#   4. 复制 .env.production 为 .env 并填入真实密钥
#
# 启动：docker compose --env-file .env up -d
# 停止：docker compose --env-file .env down
# 查看日志：docker compose logs -f
# =============================================================================

services:
  # ===========================
  # 统一入口 — Nginx 反向代理
  # ===========================
  nginx:
    image: nginx:1.27-alpine
    container_name: smart-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    networks:
      - smart-network
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy

  # ===========================
  # 基础设施
  # ===========================
  redis:
    image: redis:7.2.4
    container_name: smart-redis
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    networks:
      - smart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v3.1.0
    container_name: smart-nacos
    ports:
      - "8848:8080"
      - "9848:9848"
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=512m
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
      - NACOS_AUTH_TOKEN=${NACOS_AUTH_TOKEN:-SecretKey012345678901234567890123456789012345678901234567890123456789}
      - NACOS_AUTH_USERNAME=${NACOS_USERNAME:-nacos}
      - NACOS_AUTH_PASSWORD=${NACOS_PASSWORD:-nacos123}
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - smart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: smart-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-a2a_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../docs/database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed-data.sql
    command: >
      -c shared_preload_libraries=vector
      -c max_connections=200
    networks:
      - smart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-a2a_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: smart-zipkin
    expose:
      - "9411"
    networks:
      - smart-network
    restart: unless-stopped

  # ===========================
  # Ollama — 本地 LLM 推理
  # ===========================
  ollama:
    image: ollama/ollama:latest
    container_name: smart-ollama
    expose:
      - "11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - smart-network
    restart: unless-stopped
    # GPU 支持（如有 NVIDIA GPU，取消注释）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Ollama 模型初始化（容器启动后拉取模型）
  ollama-setup:
    image: ollama/ollama:latest
    container_name: smart-ollama-setup
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - smart-network
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
      echo 'Pulling deepseek-r1:7b model...' &&
      ollama pull deepseek-r1:7b &&
      echo 'Model pull complete' &&
      exit 0
      "
    restart: "no"

  # ===========================
  # 后端微服务
  # ===========================
  gateway:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-gateway
    container_name: smart-gateway
    expose:
      - "8081"
    environment:
      PORT: 8081
      JWT_SECRET: ${JWT_SECRET}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      # Docker 环境覆盖
      SPRING_DATA_REDIS_HOST: smart-redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: smart-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      MANAGEMENT_TRACING_ZIPKIN_TRACING_ENDPOINT: http://smart-zipkin:9411/api/v2/spans
    networks:
      - smart-network
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  user:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-user
    container_name: smart-user
    expose:
      - "8086"
    environment:
      PORT: 8086
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      # Docker 环境覆盖
      SPRING_DATASOURCE_URL: jdbc:postgresql://smart-postgres:5432/${POSTGRES_DB:-a2a_system}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: smart-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      MANAGEMENT_TRACING_ZIPKIN_TRACING_ENDPOINT: http://smart-zipkin:9411/api/v2/spans
    networks:
      - smart-network
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  consumer:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-consumer
    container_name: smart-consumer
    expose:
      - "8082"
    environment:
      PORT: 8082
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      # Docker 环境覆盖
      SPRING_DATA_REDIS_HOST: smart-redis
      SPRING_DATASOURCE_URL: jdbc:postgresql://smart-postgres:5432/${POSTGRES_DB:-a2a_system}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: smart-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      SPRING_AI_OLLAMA_BASE_URL: http://smart-ollama:11434
      MANAGEMENT_TRACING_ZIPKIN_TRACING_ENDPOINT: http://smart-zipkin:9411/api/v2/spans
      # BGE 嵌入模型路径（容器内路径）
      BGE_MODEL_PATH: /app/models/bge-large-zh-v1.5.onnx
      BGE_VOCAB_PATH: /app/models/tokenizer.json
    volumes:
      - ../models:/app/models:ro
    networks:
      - smart-network
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  router:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-router
    container_name: smart-router
    expose:
      - "8083"
    environment:
      PORT: 8083
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      # Docker 环境覆盖
      SPRING_DATA_REDIS_HOST: smart-redis
      SPRING_DATASOURCE_URL: jdbc:postgresql://smart-postgres:5432/${POSTGRES_DB:-a2a_system}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: smart-nacos:8848
      SPRING_AI_OLLAMA_BASE_URL: http://smart-ollama:11434
      MANAGEMENT_TRACING_ZIPKIN_TRACING_ENDPOINT: http://smart-zipkin:9411/api/v2/spans
    networks:
      - smart-network
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  order:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-order
    container_name: smart-order
    expose:
      - "8085"
    environment:
      PORT: 8085
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      # Docker 环境覆盖
      SPRING_DATA_REDIS_HOST: smart-redis
      SPRING_DATASOURCE_URL: jdbc:postgresql://smart-postgres:5432/${POSTGRES_DB:-a2a_system}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: smart-nacos:8848
      SPRING_AI_OLLAMA_BASE_URL: http://smart-ollama:11434
      MANAGEMENT_TRACING_ZIPKIN_TRACING_ENDPOINT: http://smart-zipkin:9411/api/v2/spans
    networks:
      - smart-network
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  product:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-product
    container_name: smart-product
    expose:
      - "8084"
    environment:
      PORT: 8084
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      # Docker 环境覆盖
      SPRING_DATA_REDIS_HOST: smart-redis
      SPRING_DATASOURCE_URL: jdbc:postgresql://smart-postgres:5432/${POSTGRES_DB:-a2a_system}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: smart-nacos:8848
      SPRING_AI_OLLAMA_BASE_URL: http://smart-ollama:11434
      MANAGEMENT_TRACING_ZIPKIN_TRACING_ENDPOINT: http://smart-zipkin:9411/api/v2/spans
    networks:
      - smart-network
    depends_on:
      nacos:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  general:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-general
    container_name: smart-general
    expose:
      - "8087"
    environment:
      PORT: 8087
      JWT_SECRET: ${JWT_SECRET}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      # Docker 环境覆盖
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: smart-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      SPRING_AI_OLLAMA_BASE_URL: http://smart-ollama:11434
      MANAGEMENT_TRACING_ZIPKIN_TRACING_ENDPOINT: http://smart-zipkin:9411/api/v2/spans
    networks:
      - smart-network
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  embedding-service:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
      args:
        SERVICE_NAME: smart-assistant-embedding-service
    container_name: smart-embedding
    expose:
      - "8091"
    environment:
      PORT: 8091
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      # Docker 环境覆盖
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: smart-nacos:8848
      SPRING_CLOUD_NACOS_DISCOVERY_PASSWORD: ${NACOS_PASSWORD:-nacos123}
      BGE_MODEL_PATH: /app/models/bge-large-zh-v1.5.onnx
      BGE_VOCAB_PATH: /app/models/tokenizer.json
    volumes:
      - ../models:/app/models:ro
    networks:
      - smart-network
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

# ===========================
# 网络 & 持久卷
# ===========================
networks:
  smart-network:
    driver: bridge

volumes:
  redis-data:
  nacos-data:
  postgres-data:
  ollama-data:
