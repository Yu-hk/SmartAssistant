# ⭐ OpenTelemetry 共享配置（Langfuse LLM 可观测性集成）
# 所有模块继承此配置，各模块可在自己的 application.yml 中按需覆盖
spring:
  ai:
    chat:
      observations:
        log-prompt: true        # 将 prompt 内容写入 OTel span（Langfuse 需要）
        log-completion: true    # 将 completion 内容写入 OTel span

management:
  tracing:
    sampling:
      probability: 1.0          # 100% 采样（生产环境可调低）
  observations:
    annotations:
      enabled: true
    enable:
      "http.server.requests": false   # 抑制重复的 HTTP server span
      "http.client.requests": false   # 抑制重复的 HTTP client span

otel:
  instrumentation:
    spring-webmvc:
      enabled: false                  # 抑制重复的 OTel HTTP server span
    spring-web:
      enabled: false                  # 抑制重复的 OTel HTTP client span

# ⭐ Langfuse OTLP 端点配置（通过环境变量注入）
# OTEL_EXPORTER_OTLP_ENDPOINT: Langfuse OTLP 地址（如 https://cloud.langfuse.com/api/public/otel）
# OTEL_EXPORTER_OTLP_HEADERS: 认证头（Authorization=Basic base64(publicKey:secretKey)）
# 同时向 Jaeger 发送时，可部署 OTel Collector 或配置双导出器。
# 当前 Jaeger OTLP gRPC 地址: http://localhost:4317

# ⭐ MinerU 适配器配置（PDF 解析增强：扫描件/复杂混排走 MinerU，数字 PDF 走 PDFBox 零子进程）
# 默认关闭；在部署环境安装 magic-pdf 与 sidecar 后设为 true 启用。
# 配置前缀 app.rag.mineru.*（见 MinerUProperties）
app:
  rag:
    mineru:
      enabled: false                       # 总开关
      sidecar-command: python mineru_sidecar.py   # 常驻 sidecar CLI 启动命令
      warm-instances: 1                    # 进程池预热实例数（模型仅加载一次）
      timeout-ms: 120000                   # 单次解析超时（毫秒）
      fallback-to-pdfbox: true             # MinerU 失败回退 PDFBox 全链路
      caption-exclusive: true              # R5 caption 独占：MinerU 活跃时禁用 PDFBox 图片 caption/OCR
      images-temp-dir: /tmp/mineru         # MinerU 抽取图片临时目录
      enabled-image-vectorization: false   # 图片向量化（v1 仅存路径，不向量化）
