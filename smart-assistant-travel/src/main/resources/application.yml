server:
  port: 8085

spring:
  application:
    name: travel-service

  # ⭐ 排除 Spring Security 自动配置 (内部服务无需认证)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  # Spring Cloud 配置
  cloud:
    compatibility-verifier:
      enabled: false  # 禁用版本兼容性检查
    
    # ⭐ 禁用 Nacos Config 导入检查
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: true
        server-addr: 127.0.0.1:8848
        namespace: ""
        group: DEFAULT_GROUP
        # 注册时携带元数据（供 Router 使用）
        metadata:
          agent-type: location_weather
          capabilities: location_query,weather_forecast,travel_planning,nearby_entertainment
          keywords: "天气,出行,旅游,位置,附近,景点,规划,周末活动,在哪里,怎么去,好玩,哪里,推荐,城市,周末去哪,游玩"
          # ⭐ 版本管理
          version: "1.0.0"
          protocol-version: "v1"
          min-client-version: "1.0.0"
          supported-protocols: "a2a-v1"

  # 禁用 SQL 初始化依赖检测（解决 MyBatis Plus 兼容性问题）
  sql:
    init:
      mode: never

  # 数据源配置（PostgreSQL + MyBatis Plus）
  datasource:
    url: jdbc:postgresql://localhost:5432/a2a_system
    username: postgres  # ⭐ 使用统一的应用用户，权限控制在应用层实现
    password: ${POSTGRES_PASSWORD:postgres123}  # ⭐ 生产环境请使用环境变量或密钥管理服务
    driver-class-name: org.postgresql.Driver

  # 高德地图 API 配置（用于搜索附近娱乐项目）
  amap:
    api:
      key: ${AMAP_API_KEY:}  # 请替换为实际的高德地图 API Key，申请地址：https://lbs.amap.com/

  # DashScope Embedding API 配置
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}  # 阿里云 DashScope API Key
      embedding:
        options:
          model: text-embedding-v4  # 最新模型，支持多语言，输出 1024 维向量
    
    # DeepSeek 模型配置
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}  # DeepSeek API Key，申请地址：https://platform.deepseek.com/
      chat:
        options:
          model: deepseek-v4-flash  # 最新 V4 快闪模型，1M 上下文，支持思维链
          temperature: 0.5
          max-tokens: 512
          log-requests: false
          log-responses: false
    
    # Spring AI Alibaba A2A 配置
    alibaba:
      a2a:
        # Nacos 注册中心配置
        nacos:
          server-addr: 127.0.0.1:8848
          registry:
            enabled: true  # 启用 Nacos 注册（需要 Nacos 3.x 版本）
            namespace: ""  # 使用默认 namespace (public)
            group: DEFAULT_GROUP
            # Agent 特征元数据（用于 Router 智能路由）
            metadata:
              agent-type: location_weather
              capabilities: location_query,weather_forecast,travel_planning,nearby_entertainment
              keywords: "天气,出行,旅游,位置,附近,景点,规划,周末活动,在哪里,怎么去,好玩,哪里,推荐,城市,周末去哪,游玩"
              support-location: true
              support-weather: true
              support-planning: true
              priority: 10
              # ⭐ 版本管理
              version: "1.0.0"
              protocol-version: "v1"
              min-client-version: "1.0.0"
              supported-protocols: "a2a-v1"
        # A2A 服务端配置
        server:
          enabled: true
          card:
            name: location_weather  # ⭐ 与路由规则中的 agent_name 保持一致
            description: "地理位置、天气与出行规划智能体 - 提供位置信息、天气预报和根据天气的出行建议"
            version: "1.0.0"
    
    # ⭐ MCP Server 配置（内嵌模式）
    mcp:
      server:
        enabled: true  # 启用 MCP Server

# Actuator + Prometheus + Tracing 配置（监控端点）⭐
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,refresh,mappings  # ⭐ 添加 refresh 端点支持热重载
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
  
  # 分布式追踪配置 (Jaeger - Zipkin 兼容模式)
  tracing:
    sampling:
      probability: 1.0  # ⭐ 启用全量采样，生产环境可调整为 0.1-0.3
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans  # ⭐ Jaeger 兼容 Zipkin 协议的端点
  prometheus:
    metrics:
      export:
        enabled: true

# Travel RAG 配置
travel:
  rag:
    enabled: true                     # 是否启用 RAG 功能
    top-k: 5                          # 返回最相关的 K 个结果（TopN 筛选数量）
    similarity-threshold: 0.5        # 相似度阈值
    chunk:
      strategy: semantic              # fixed | semantic（分块策略）
      semantic-threshold: 0.6        # 语义分块相似度阈值
      min-chunk-size: 50             # 最小分块长度（字符）
      max-chunk-size: 500            # 最大分块长度（字符）

# Logging 配置（输出到文件，供 Loki 收集）⭐
logging:
  file:
    name: logs/${spring.application.name}.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
