server.shutdown: graceful  # ⭐ 优雅关闭，等待处理中的请求完成
server:
  port: 8085

spring:
  application:
    name: order-service

  # ⭐ 排除 Spring Security + DeepSeek 自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.ai.model.deepseek.autoconfigure.DeepSeekChatAutoConfiguration

  # Spring Cloud 配置
  cloud:
    compatibility-verifier:
      enabled: false  # 禁用版本兼容性检查
    
    # ⭐ 禁用 Nacos Config 导入检查
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: true
        server-addr: 127.0.0.1:8848
        namespace: ""
        group: DEFAULT_GROUP
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD}
        # Agent 特征元数据（用于 Router Agent 发现和路由决策）
        metadata:
          agent-type: order_agent
          capabilities: order_query,refund,logistics,delivery,text_to_sql
          keywords: "订单,退款,退货,物流,快递,取消,换货,售后,投诉,赔偿,发货,收货,查单,包裹,配送"
          priority: 10
          cache-ttl-seconds: "43200"    # ⭐ 回复缓存 TTL（秒），订单类 12h（订单状态相对稳定）
          always-cache-reply: "true"    # ⭐ 首次即缓存回复

  # 禁用 SQL 初始化依赖检测（解决 MyBatis Plus 兼容性问题）
  sql:
    init:
      mode: never

  # Redis 配置（用于 seenNoteIds 不放回追踪等）
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD}  # ⚠️ 必须设置 REDIS_PASSWORD 环境变量
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # 数据源配置（PostgreSQL + MyBatis Plus）
  datasource:
    url: jdbc:postgresql://localhost:5432/a2a_system
    username: postgres  # ⭐ 使用统一的应用用户，权限控制在应用层实现
    password: ${POSTGRES_PASSWORD}  # ⚠️ 必须设置 POSTGRES_PASSWORD 环境变量
    driver-class-name: org.postgresql.Driver

  ai:
    # ⭐ Ollama 本地模型配置（本地推理主通道）
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: deepseek-r1:7b
          temperature: 0.7

    # ⭐ MCP Server 配置（内嵌模式）
    mcp:
      server:
        enabled: true  # 启用 MCP Server

# 高德地图 API 配置（用于搜索附近娱乐项目）
amap:
  api:
    key: ${AMAP_API_KEY:}  # 请替换为实际的高德地图 API Key，申请地址：https://lbs.amap.com/

# Actuator + Prometheus + Tracing 配置（监控端点）⭐
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,refresh,mappings  # ⭐ 添加 refresh 端点支持热重载
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: development
  
  # 分布式追踪配置 (Jaeger - Zipkin 兼容模式)
  tracing:
    sampling:
      probability: 0.3  # ⭐ 采样率 30%（开发环境已足够，生产环境可调整为 0.1）
    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans  # ⭐ Jaeger 兼容 Zipkin 协议的端点
  prometheus:
    metrics:
      export:
        enabled: true

# Travel RAG 配置
travel:
  rag:
    enabled: true                     # 是否启用 RAG 功能
    top-k: 5                          # 返回最相关的 K 个结果（TopN 筛选数量）
    similarity-threshold: 0.5        # 相似度阈值
    chunk:
      strategy: semantic              # fixed | semantic（分块策略）
      semantic-threshold: 0.45        # 语义分块相似度阈值（经实测调整）
      min-chunk-size: 80             # 最小分块长度（字符）
      max-chunk-size: 800            # 最大分块长度（字符）

# ⭐ BGE embedding 配置（1.2GB 模型从项目级共享目录加载）
bge:
  model:
    path: ${BGE_MODEL_PATH:D:\\workspace\\SmartAssistant\\models\\bge-large-zh-v1.5.onnx}
  vocab:
    path: ${BGE_VOCAB_PATH:D:\\workspace\\SmartAssistant\\models\\tokenizer.json}

# ⭐ MCP 表访问白名单配置（用于 TextToSqlTool 安全控制）
mcp:
  order:
    allowed-tables:
      - orders
      - order_refunds
      - order_logistics
      - approval_records
      - products
    forbidden-tables:
      - users
      - user_sessions

# Logging 配置（输出到文件，供 Loki 收集）⭐
logging:
  file:
    name: logs/${spring.application.name}.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
